{% set name = "pylook" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 95abc0f77cb5cacba44993b6e6a9b3ec0e9e22e4aabae0453745fb2801000b15

build:
  noarch: python
  number: 1
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
    - setuptools_scm
  
  run:
    - python >={{ python_min }}
    - matplotlib-base >=2.1.0
    - numpy >=1.16
    - pint >=0.10.1
    - pandas >=0.22.0
    - pooch >=0.1

test:
  requires:
    - python {{ python_min }}
  imports:
    - pylook.calc
    - pylook.io
    - pylook.units
    - pylook.cbook

about:
  home: https://github.com/LeemanGeophysicalLLC/pylook
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Data analysis tools for rock mechanics.'
  description: |
    Data analysis tools for rock mechanics experiments in the spirit of the
    legacy XLook tool.
  doc_url: https://leemangeophysicalllc.github.io/pylook/
  dev_url: https://github.com/LeemanGeophysicalLLC/pylook

extra:
  recipe-maintainers:
    - jrleeman
